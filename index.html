            image-container {
                display: flex;
                flex-wrap: wrap;

                gap: 10px;
            }
        </style>
    </div>

    <div id ="overlay" onclick="closeimg()">
        <img id="fullimg">
         
        <script>
            let images =[]
            let currentIndex = 0;

            document.querySelectorAll("img[onclick]").forEach((img, index) => {
                images.push(img.src);
                
                });
            
            function openimg(img){
                currentIndex = images.indexOf(img.src);
                document.getElementById("fullimg").src = img.src;
                document.getElementById("overlay").style.display = "flex";
            }
            function closeimg(){
                document.getElementById("overlay").style.display = "none";
            }
            document.addEventListener("keydown", function(event){
                if(event.key === "ArrowRight"){
                    currentIndex = (currentIndex + 1) % images.length;
                    document.getElementById("fullimg").src = images[currentIndex];
                } else if(event.key === "ArrowLeft"){
                    currentIndex = (currentIndex - 1 + images.length) % images.length;
                    document.getElementById("fullimg").src = images[currentIndex];
                }
            });
        </script>
