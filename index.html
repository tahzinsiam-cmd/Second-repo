<!DOCTYPE html>

    <title>MyPhotos</title>
    <style>
       
        .container{
            
            position: relative;
            width: 400px;
            height: 400px;
            margin: 50px auto;
        }
        .sun{
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height:80px;
            background-color: yellow;
            border-radius: 50%;
            box-shadow: 0 0 40px orange, 0 0 80px yellow;

        }
        /*earth orbit ring*/
        .earth-orbit{
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
           
            animation: rotate 10s linear infinite;
        }
        .earth{
            position: absolute;
            top: -15px;
            left: 140px;
            width: 30px;
            height: 30px;
            background-color: blue;
            border-radius: 50%;
            box-shadow: 0 0 1em cyan;
        }
        /*moon orbit ring*/
        .moon-orbit{
            position: absolute;
            top: 50%;
            left: 50%;
            width: 80px;
            height: 80px;
            margin-left: -40px;
            margin-top: -40px;
            animation: orbit 2s linear infinite;
        }
        .moon{
            position: absolute;
            top: -8px;
            left: 45px;
            margin-left: -8px;
            width: 16px;
            height: 16px;
            background-color: silver;
            border-radius: 50%;
        }
        @keyframes rotate{
            from{
                transform: rotate(0deg);
            }
            to{
                transform: rotate(360deg);
            }
        }
        @keyframes orbit{
            from{
                transform: rotate(0deg);
            }
            to{
                transform: rotate(360deg);
            }
        }
    </style>
    <style>   
            #overlay{
                position: fixed;

                width: 100%;

                background-color: rgba(0,0,0,0.8);

</head>

    <div id ="overlay"style="display:none;" >
        <img id="fullimg">
        <button onclick="closeimg()">Close</button>
        <style>
            button {
                position: absolute;
                top: 20px;
                right: 20px;
                padding: 10px 20px;
                background-color: #f70505;
                color: white;
                border: none;
                border-radius: 5px;
                cursor: pointer;
            }
        </style>

         
        <script>
            let images =[]
            let currentIndex = 0;

            document.querySelectorAll("img[onclick]").forEach((img, index) => {
                images.push(img.src);
                
                });
            
            function openimg(img){
                currentIndex = images.indexOf(img.src);
                document.getElementById("fullimg").src = img.src;
                document.getElementById("overlay").style.display = "flex";
            }
            function closeimg(){
                document.getElementById("overlay").style.display = "none";
            }
            document.addEventListener("keydown", function(event){
                if(event.key === "ArrowRight"){
                    currentIndex = (currentIndex + 1) % images.length;
                    document.getElementById("fullimg").src = images[currentIndex];
                } else if(event.key === "ArrowLeft"){
                    currentIndex = (currentIndex - 1 + images.length) % images.length;
                    document.getElementById("fullimg").src = images[currentIndex];
                }
            });
        </script>
