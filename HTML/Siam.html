<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photos</title>
    <style>   
            #overlay{
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background-color: rgba(0,0,0,0.8);
                display: none;
                justify-content: center;
                align-items: center;
                cursor: pointer;
            }
            #overlay img{
                max-width: 90%;
                max-height: 90%;
            }
        </style>
</head>
<body>
    <h1> My Photos</h1>
        <style>
            h1 {
                color: blue;
                text-align: center;
                padding: 20px;
                background-color: rgb(164, 120, 120);
                width: fit-content;
                margin: 0 auto;
            }
        </style>
    <h2> In this website, I store my Clicks</h2>
        <style>
            h2 {
                color: rgb(20, 167, 221);
                text-align: center;
                padding: 20px;
                background-color: rgb(255, 253, 253);
                width: fit-content;
                margin: 0 auto;
            }
        </style>
    <img src="AA.jpeg" alt="Landscape" height="100" width="200" onclick="openimg(this)">
    <img src="AB.jpeg" alt="Landscape" height="100" width="200" onclick="openimg(this)">
    <img src="AC.jpeg" alt="Landscape" height="100" width="200" onclick="openimg(this)">
    <img src="AE.jpeg" alt="Landscape" height="100" width="200" onclick="openimg(this)">
    <img src="AF.jpeg" alt="Landscape" height="100" width="200" onclick="openimg(this)">
    <img src="AG.jpeg" alt="Landscape" height="100" width="200" onclick="openimg(this)">
    <img src="AD.jpeg" alt="Landscape" height="200" width="100" onclick="openimg(this)">

    <div id ="overlay" onclick="closeimg()">
        <img id="fullimg">
         
        <script>
            function openimg(img){
                document.getElementById("fullimg").src = img.src;
                document.getElementById("overlay").style.display = "flex";
            }
            function closeimg(){
                document.getElementById("overlay").style.display = "none";
            }
        </script>
    </div>
</body>
</html>
